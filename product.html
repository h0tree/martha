<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Книжная лавка</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=Geologica:wght@100..900&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=Geologica:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">

        <link href="styles/profile_product.css" rel="stylesheet">


    </head>
    <body>
        <div id="loader">
            <div class="spinner"></div>
        </div>
        <div class="payment">
            <div class="payment__window">
                <p class="payment__BefPrice">к оплате</p>
                <p class="payment__price">3000</p>
                <p class="payment__subPrice">рублей</p>
                <div class="payment__string"></div>
                <form action="" class="payment__form">
                    <input type="text" class="payment__input" placeholder="Ваш адрес" required></input>
                    <input type="email" class="payment__input" placeholder="Ваш email" required></input>
                    <button class="payment__pay" type="submit">Перейти к оплате</button>
                </form>
            </div>
        </div>
    <header class="header">
        <h1 class="header-title">Книжная лавка</h1>
        <nav class="header-listmenu">
            <a href="index.html" class="header-listmenu-text">Каталог</a>
            <a href="#" class="header-listmenu-text">Случайная книга</a>
            <a href="#" class="header-listmenu-text">Оплата и доставка</a>
        </nav>

ill="#0A183B"/>

        <div class="menu-button">
            <span class="menu-button-arrow"> </span>
            <span class="menu-button-arrow"> </span>
        </div>
    </header>
        <main class="main__product">
            <div class="product__content">
                <section class="product_preview">
                    <div class="preview__top">
                        <h1 class="preview_title"> </h1>
                        <p class="preview_auther">Автор: <span class="auther"> </span></p>
                    </div>
                    <img src="" class="preview_imges">
                </section>
                <section class="preview__description">
                    <div class="preview__description-content">
                        <h2 class="description-title">Описание</h2>
                        <p class="description-p description-p__product"> </p>
                    </div>
                </section>
                <section class="product__information">
                    <div class="information__content">
                    <p class="information__p"><span class="informationName">Жанр: </span><span class="informationText"></span></p>
                    <p class="information__p"><span class="informationName">Издательство: </span><span class="informationText"></span></p>
                    <p class="information__p"><span class="informationName">Год издания: </span><span class="informationText"></span></p>
                    <p class="information__p"><span class="informationName">Возрастное ограничение: </span><span class="informationText"></span></p>
                    </div>
                </section>
                <section class="product_promo">
                    <input type="text" class="product_promo_input" placeholder="Промокод"></input>
                    <button class="product_actived">Применить</button>
                    <button class="product_buy"></button>
                </section>
                <section class="product_price">
                    <p class="product_price_title">Итоговая цена:</p>
                    <p class="product_price_text"> </p>
                </section>
            </div>
        </main>
        <div class="announcement">
            <h3 class="announcement__title">УСПЕШНО</h3>
            <p class="announcement__p">Вы успешно оплатили заказ!</p>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="script/burger-menu.js"></script>
    <script src="script/loading.js"></script>

    <script src="script/randomBook.js"></script>
    <script src="script/product_profile.js"></script>
    <script src="script/anons.js"></script>
    <script src="script/payment.js"></script>
    <script src="script/promo.js"></script>
    <script>

  // Привязываем кнопку "Личный кабинет"
  document.getElementById("profile-btn").onclick = async () => {
    const { data } = await client.auth.getUser();

    if (data.user) {
      // Пользователь авторизован → редирект на profile.html
      window.location.href = "profile.html";
    } else {
      // Пользователь не авторизован → редирект на login.html
      window.location.href = "login.html";
    }
  };
</script>
</html>
