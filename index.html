<!DOCTYPE html>
<html>
<head>
    <title>Книжная лавка - интеренет магазин книг</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <link href="styles-new.css" rel="stylesheet">

</head>
<body>
    <header class="header">
        <h1 class="header-title">Книжная лавка</h1>
        <nav class="header-listmenu">
            <a href="#" class="header-listmenu-text">Каталог</a>
            <a href="#" class="header-listmenu-text">Случайная книга</a>
            <a href="#" class="header-listmenu-text">Оплата и доставка</a>
        </nav>
        <img src="imges/profile.svg" alt="Иконка для входа в аккаунт">
        <div class="menu-button">
            <span class="menu-button-arrow"> </span>
            <span class="menu-button-arrow"> </span>
        </div>
    </header>
    <div class="banner">
        <!-- Slider main container -->
        <div class="swiper">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide"><img src="imges/banner/banner.png" alt="" width="1350" height="600"></div>
            <div class="swiper-slide"><img src="imges/banner/banner.png" alt="" width="1350" height="600"></div>
            ...
        </div>
        <!-- If we need pagination -->
        <div class="swiper-pagination"></div>

        <!-- If we need navigation buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
        </div>
    </div>
    <main class="catalog">
        <h1 class="catalog-title">ВЫБОР РЕДАКЦИИ</h1>
            <ul class="product-list">

            </ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script/data.js"></script>
    <script src="script/catalog.js"></script>
    <script src="script/banner.js"></script>
    <script src="script/burger-menu.js"></script>
</body>
</html>
