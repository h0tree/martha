<body>

        <!-- Иконка профиля (теперь ведет на главную или обновляет страницу) -->

  <div id="address-modal" class="modal-overlay" style="display: none;">
      <div class="modal-card">
          <h3 class="modal-title">Нужен ваш адрес</h3>
          <p class="modal-text">Пожалуйста, укажите адрес доставки, чтобы мы могли привозить вам книги быстрее.</p>
          <input type="text" id="modal-address-input" placeholder="Город, улица, дом, квартира" class="modal-input">
          <button id="save-address-btn" class="modal-button">Сохранить и продолжить</button>
      </div>
  </div>

    <div class="container">
        <div class="card profile-card">
            <div class="profile-header">
                <div class="avatar-placeholder"></div>
                <div class="email" id="user-email">Загрузка...</div>
            </div>
            <div class="profile-info">
                <p>Адрес: <span id="user-address">Не указан</span></p>
                <p>Дата регистрации: <span id="user-created">...</span></p>
                <p>Всего заказов: <span id="user-orders">0</span></p>
                <p>Потрачено: <span id="user-spent">0</span>₽</p>
                <p>Последний заказ: <span id="user-last-order">—</span></p>
            </div>
            <button id="logout" class="logout-button">Выйти</button>
        </div>
    </div>

    <script src="script/burger-menu.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Инициализация
        const client = window.supabase.createClient(
            "https://cejwvftwqbsynomkodvy.supabase.co",
            "sb_publishable_CW1Q1g2giFzoC5YUSR2kUQ_RbvkoZaa"
        );

async function loadProfile() {
    const { data: { user } } = await client.auth.getUser();

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const { data: profile, error } = await client
        .from("users_profile")
        .select("*")
        .eq("id", user.id)
        .single();

    if (error) return console.error(error);

    // Заполняем данные на странице
    document.getElementById("user-email").textContent = user.email;
    document.getElementById("user-orders").textContent = profile.total_orders || 0;
    document.getElementById("user-spent").textContent = profile.total_spent || 0;
    
    const addressSpan = document.getElementById("user-address");
    addressSpan.textContent = profile.address || "Не указан";

    // --- ЛОГИКА МОДАЛЬНОГО ОКНА ---
    if (!profile.address) {
        const modal = document.getElementById("address-modal");
        const saveBtn = document.getElementById("save-address-btn");
        const input = document.getElementById("modal-address-input");

        modal.style.display = "flex"; // Показываем модалку

        saveBtn.onclick = async () => {
            const newAddress = input.value.trim();
            
            if (newAddress.length < 5) {
                alert("Пожалуйста, введите корректный адрес");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = "Сохранение...";

            // ОБНОВЛЯЕМ БЕКЕНД
            const { error: updateError } = await client
                .from("users_profile")
                .update({ address: newAddress })
                .eq("id", user.id);

            if (updateError) {
                alert("Ошибка сохранения: " + updateError.message);
                saveBtn.disabled = false;
                saveBtn.textContent = "Попробовать снова";
            } else {
                // Успех! Закрываем и обновляем текст на странице
                modal.style.display = "none";
                addressSpan.textContent = newAddress;
            }
        };
    }
}

        // Запуск при загрузке
        loadProfile();
    </script>
</body>
