    <div class="container">
        <div class="card profile-card">
            <div class="profile-header">
                <div class="avatar-placeholder"></div>
                <div class="email" id="user-email">Загрузка...</div>
            </div>
            <div class="profile-info">
                <p>Дата регистрации: <span id="user-created">Загрузка...</span></p>
                <p>Всего заказов: <span id="user-orders">0</span></p>
                <p>Всего потрачено денег: <span id="user-spent">0р</span></p>
                <p>Баллов: <span id="user-points">0</span></p>
            </div>
            <button id="logout" class="logout-button">Выйти</button>
        </div>
    </div>
    <script src="script/burger-menu.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const client = window.supabase.createClient(
    "https://cejwvftwqbsynomkodvy.supabase.co",
    "sb_publishable_CW1Q1g2giFzoC5YUSR2kUQ_RbvkoZaa"
  );

  // Создаём профиль пользователя, если его ещё нет
  async function createUserProfileIfNotExists(userId) {
    const { data, error } = await client
      .from('users_profile')
      .insert([{ id: userId }])
      .select();

    if (error && !error.message.includes("duplicate key")) {
      console.error("Ошибка создания профиля:", error);
    }
  }

  // Загружаем профиль
  async function loadProfile() {
    const { data: userData } = await client.auth.getUser();

    if (!userData.user) {
      window.location.href = "login.html"; // если не авторизован
      return;
    }

    const userId = userData.user.id;

    // Создаём профиль, если его нет
    await createUserProfileIfNotExists(userId);

    // Загружаем данные профиля
    const { data, error } = await client
      .from("users_profile")
      .select("*")
      .eq("id", userId)
      .single();

    if (error) {
      console.error("Ошибка загрузки профиля:", error.message);
      return;
    }

    // Заполняем элементы страницы
    document.getElementById("user-email").textContent = userData.user.email;
    document.getElementById("user-created").textContent = new Date(data.created_at).toLocaleDateString();
    document.getElementById("user-orders").textContent = data.orders;
    document.getElementById("user-spent").textContent = data.spent + "р";
    document.getElementById("user-points").textContent = data.points;
  }

  // Кнопка выхода
  document.getElementById("logout").onclick = async () => {
    await client.auth.signOut();
    window.location.href = "login.html";
  };

  loadProfile();


  
</script>

</html>
